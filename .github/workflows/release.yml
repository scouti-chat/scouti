name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Build release artifacts
        # Cross-compiled binaries + per-platform tarballs + skill.tar.gz, all in ./dist.
        run: make dist
      - name: Publish artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
